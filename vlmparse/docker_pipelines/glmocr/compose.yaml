
services:
  glmocr-vllm-server:
    image: vllm/vllm-openai:nightly
    container_name: vlmparse-glmocr-vllm-server
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        apt-get update && apt-get install -y git curl &&
        pip install --no-cache-dir git+https://github.com/huggingface/transformers.git &&
        pip install --no-cache-dir --upgrade mistral-common &&
        vllm serve zai-org/GLM-OCR --served-model-name glm-ocr --allowed-local-media-path / --port 8080 --speculative-config '{"method": "mtp", "num_speculative_tokens": 1}'
    ports:
      - "${VLM_PORT:-8080}:8080"
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - HF_HOME=/root/.cache/huggingface
    shm_size: '16gb'
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 500s

  glmocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vlmparse-glmocr-api${API_IMAGE_TAG_SUFFIX:-}
    container_name: vlmparse-glmocr-api
    ports:
      - "${API_PORT:-5002}:5002"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      glmocr-vllm-server:
        condition: service_healthy
    stop_grace_period: 30s
    volumes:
      - ./config.yaml:/app/GLM-OCR/glmocr/config.yaml:ro

networks:
  default:
    name: glmocr-network
